global:
  resolve_timeout: 5m

route:
  # Default receiver
  receiver: 'ntfy'

  # Group alerts by alertname and instance
  group_by: ['alertname', 'instance']

  # Wait before sending notification for new group (batch similar alerts)
  group_wait: 10s

  # Wait before sending notification about new alerts in existing group
  group_interval: 5m

  # Wait before sending notification about resolved alerts
  repeat_interval: 3h

  # Route critical alerts differently
  routes:
    - match:
        severity: critical
      receiver: 'ntfy-critical'
      repeat_interval: 30m

receivers:
  # ntfy.sh notifications for warnings
  - name: 'ntfy'
    webhook_configs:
      - url: 'https://ntfy.sh/kofi-homelab-alerts'
        send_resolved: true
        http_config:
          follow_redirects: true

  # ntfy.sh notifications for critical (more frequent)
  - name: 'ntfy-critical'
    webhook_configs:
      - url: 'https://ntfy.sh/kofi-homelab-alerts'
        send_resolved: true
        http_config:
          follow_redirects: true

inhibit_rules:
  # Inhibit warning if critical alert is already firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
