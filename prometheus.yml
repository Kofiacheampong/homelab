global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load alert rules
rule_files:
  - '/etc/prometheus/alerts/*.rules.yml'

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Docker host system metrics
  - job_name: 'docker-host'
    static_configs:
      - targets: ['node-exporter:9100']

  # Docker container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Pi-hole metrics
  # SETUP: Install ekofr/pihole-exporter on your Pi-hole host
  # Then update the IP below to your Pi-hole's IP address
  - job_name: 'pihole'
    scrape_interval: 60s  # Longer interval for slow exporter
    scrape_timeout: 30s   # Extended timeout for Pi-hole exporter
    static_configs:
      - targets: ['192.168.1.200:9617']  # UPDATE THIS IP
        labels:
          instance: 'pihole'

  # Additional RPi/servers running node-exporter
  # SETUP: Install node-exporter on each machine, then add targets below
  - job_name: 'homelab-servers'
    static_configs:
      - targets:
          - '192.168.1.200:9100'  # rpi-1
        labels:
          group: 'raspberry-pi'
