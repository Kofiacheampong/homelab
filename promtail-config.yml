server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape Docker container logs
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      # Parse JSON logs from Docker
      - json:
          expressions:
            output: log
            stream: stream
            attrs: attrs
            tag: attrs.tag
      # Extract container name from tag
      - regex:
          expression: '(?P<container_name>(?:[^|]*\|){2}(?P<image_name>[^|]+)|(?P<image_id>[^|]+))'
          source: tag
      # Add labels
      - labels:
          stream:
          container_name:
          image_name:
      # Output the actual log content
      - output:
          source: output

  # System logs are disabled by default because many host files under /var/log
  # are root-only on Debian/Ubuntu and generate noisy permission errors.
  # Re-enable with a narrower readable path or run promtail with elevated access.
